# ================================
# 本地开发配置 (Local Profile)
# ================================
# 使用方法: 启动时添加参数 --spring.profiles.active=local
# 此文件不会被发布到微信云托管（云托管使用环境变量配置）
# ================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springboot_demo?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123

server:
  port: 80


mybatis:
  mapper-locations: classpath*:mapper/*Mapper.xml

# ======== 拼团搜索首页配置 ========
groupbuy:
  home:
    brands:
      - 鲜明
      - 蓝氏
      - 网易严选
      - 领先
    categories:
      - 猫砂
      - 猫粮
      - 狗粮
      - 零食
      - 玩具
      - 日用品

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    lang: zh-cn

knife4j:
  enable: true
  setting:
    language: zh_cn
